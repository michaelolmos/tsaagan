<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="980" height="620" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="979" height="619" fill="none" stroke="#d0d7de"/>

  <text x="36" y="46" font-size="26" font-weight="700" fill="#1a1a2e">🦅 Kestrel — capability layers</text>
  <text x="36" y="72" font-size="14.5" fill="#555">Give your agent real hands. Use the <tspan font-weight="700" fill="#1a1a2e">lightest layer that does the job.</tspan></text>

  <!-- brain -->
  <rect x="330" y="92" width="320" height="62" rx="12" fill="#fbeee6" stroke="#b5532a" stroke-width="2"/>
  <text x="490" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Your AI agent — the brain</text>
  <text x="490" y="139" text-anchor="middle" font-size="12" fill="#555">Claude · Codex / ChatGPT CLI · Cursor · Groq · you</text>
  <line x1="490" y1="154" x2="490" y2="182" stroke="#9aa4b2" stroke-width="2"/>
  <polygon points="490,190 484,178 496,178" fill="#9aa4b2"/>

  <!-- kestrel container -->
  <rect x="40" y="192" width="900" height="316" rx="14" fill="#f6f8fa" stroke="#b5532a" stroke-width="2"/>
  <text x="64" y="218" font-size="15" font-weight="700" fill="#b5532a">KESTREL — perceive · ground · act · VERIFY · self-heal</text>

  <!-- three layer cards -->
  <!-- L1 API -->
  <rect x="64" y="234" width="270" height="146" rx="11" fill="#e9f7ef" stroke="#1f8a4c" stroke-width="1.5"/>
  <text x="80" y="260" font-size="15" font-weight="700" fill="#1f8a4c">① API layer</text>
  <text x="80" y="283" font-size="12.5" fill="#1a1a2e">Official API + Keychain key</text>
  <text x="80" y="304" font-size="12" fill="#555">fastest · robust · no anti-bot</text>
  <text x="80" y="324" font-size="12" fill="#555">your own credentials, stored locally</text>
  <text x="80" y="352" font-size="11.5" fill="#1f8a4c" font-weight="600">browser can set the key up for you</text>

  <!-- L2 Real browser -->
  <rect x="355" y="234" width="270" height="146" rx="11" fill="#fbeee6" stroke="#b5532a" stroke-width="1.5"/>
  <text x="371" y="260" font-size="15" font-weight="700" fill="#b5532a">② Real browser</text>
  <text x="371" y="283" font-size="12.5" fill="#1a1a2e">extension / native</text>
  <text x="371" y="304" font-size="12" fill="#555">trusted input (isTrusted=true)</text>
  <text x="371" y="324" font-size="12" fill="#555">no debug port · real profile</text>
  <text x="371" y="352" font-size="11.5" fill="#b5532a" font-weight="600">sites that ignore synthetic input</text>

  <!-- L3 CDP -->
  <rect x="646" y="234" width="270" height="146" rx="11" fill="#eaf2f8" stroke="#2a6f97" stroke-width="1.5"/>
  <text x="662" y="260" font-size="15" font-weight="700" fill="#2a6f97">③ CDP / Playwright</text>
  <text x="662" y="283" font-size="12.5" fill="#1a1a2e">real-Chrome channel</text>
  <text x="662" y="304" font-size="12" fill="#555">a11y refs · self-heal · vision</text>
  <text x="662" y="324" font-size="12" fill="#555">fast · parallel · cross-platform</text>
  <text x="662" y="352" font-size="11.5" fill="#2a6f97" font-weight="600">the broad web (~95%)</text>

  <!-- verify strip -->
  <rect x="64" y="392" width="852" height="30" rx="8" fill="#fff7ed" stroke="#e0b896"/>
  <text x="80" y="412" font-size="12.5" fill="#7c2d12">Every action is <tspan font-weight="700">VERIFIED</tspan> against real page state — url · expected text · console errors · failed requests.</text>

  <!-- agent layer strip -->
  <rect x="64" y="430" width="852" height="62" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="80" y="453" font-size="13" font-weight="700" fill="#1a1a2e">Agent layer</text>
  <text x="80" y="475" font-size="12" fill="#555">SOUL.md (identity) · AGENTS.md (doctrine) · HEARTBEAT.md (cadence) · Brain = SQLite memory + learnings · Keychain vault</text>

  <!-- to web -->
  <line x1="490" y1="508" x2="490" y2="536" stroke="#9aa4b2" stroke-width="2"/>
  <polygon points="490,544 484,532 496,532" fill="#9aa4b2"/>
  <rect x="410" y="546" width="160" height="40" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="490" y="571" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">The Web</text>

  <text x="588" y="572" font-size="12" fill="#555">Built to empower agentic workflows — not abuse.</text>
</svg>
