<svg xmlns="http://www.w3.org/2000/svg" width="980" height="660" viewBox="0 0 980 660" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="980" height="660" fill="#ffffff"/>
  <rect x="0" y="0" width="980" height="660" fill="none" stroke="#d0d7de" stroke-width="1"/>

  <!-- title -->
  <text x="40" y="48" font-size="28" font-weight="700" fill="#1a1a2e">🦅 Kestrel — how it works</text>
  <text x="40" y="78" font-size="16" fill="#b5532a" font-weight="600">The brain decides. Kestrel is the hands.</text>

  <!-- BRAIN -->
  <rect x="270" y="104" width="440" height="78" rx="12" fill="#fbeee6" stroke="#b5532a" stroke-width="2"/>
  <text x="490" y="132" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">BRAIN — the AI driving it</text>
  <text x="490" y="156" text-anchor="middle" font-size="13" fill="#444">Claude Code · Codex / ChatGPT CLI · Cursor</text>
  <text x="490" y="173" text-anchor="middle" font-size="13" fill="#444">— or Groq, for fully autonomous mode</text>

  <!-- arrow brain -> kestrel -->
  <line x1="490" y1="182" x2="490" y2="214" stroke="#9aa4b2" stroke-width="2"/>
  <polygon points="490,222 484,210 496,210" fill="#9aa4b2"/>

  <!-- KESTREL container -->
  <rect x="50" y="224" width="880" height="270" rx="14" fill="#f6f8fa" stroke="#b5532a" stroke-width="2"/>
  <text x="72" y="252" font-size="16" font-weight="700" fill="#b5532a">KESTREL — the hands (a tool: CLI + background daemon)</text>

  <!-- CLI -> Daemon -->
  <rect x="80" y="270" width="180" height="56" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="170" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">CLI</text>
  <text x="170" y="313" text-anchor="middle" font-size="12" fill="#666">kestrel.js · &lt;command&gt;</text>

  <line x1="260" y1="298" x2="312" y2="298" stroke="#9aa4b2" stroke-width="2"/>
  <polygon points="320,298 308,292 308,304" fill="#9aa4b2"/>

  <rect x="322" y="270" width="320" height="56" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="482" y="294" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Daemon</text>
  <text x="482" y="313" text-anchor="middle" font-size="12" fill="#666">one persistent Playwright page (stable refs)</text>

  <!-- the loop -->
  <text x="80" y="360" font-size="13" font-weight="700" fill="#1a1a2e">The loop, every action:</text>
  <g font-size="12.5" font-weight="600">
    <rect x="80"  y="372" width="120" height="44" rx="9" fill="#eaf2f8" stroke="#2a6f97"/>
    <text x="140" y="392" text-anchor="middle" fill="#1a1a2e">Perceive</text>
    <text x="140" y="408" text-anchor="middle" font-size="10.5" font-weight="400" fill="#555">a11y tree + vision</text>

    <rect x="214" y="372" width="96" height="44" rx="9" fill="#eaf2f8" stroke="#2a6f97"/>
    <text x="262" y="398" text-anchor="middle" fill="#1a1a2e">Act</text>

    <rect x="324" y="372" width="150" height="44" rx="9" fill="#e9f7ef" stroke="#1f8a4c"/>
    <text x="399" y="392" text-anchor="middle" fill="#1a1a2e">VERIFY</text>
    <text x="399" y="408" text-anchor="middle" font-size="10" font-weight="400" fill="#555">url·text·console·net</text>

    <rect x="488" y="372" width="120" height="44" rx="9" fill="#eaf2f8" stroke="#2a6f97"/>
    <text x="548" y="398" text-anchor="middle" fill="#1a1a2e">Self-heal</text>

    <rect x="622" y="372" width="170" height="44" rx="9" fill="#fbeee6" stroke="#b5532a"/>
    <text x="707" y="392" text-anchor="middle" fill="#1a1a2e">Memory</text>
    <text x="707" y="408" text-anchor="middle" font-size="10" font-weight="400" fill="#555">learns each site, on its own</text>
  </g>
  <!-- arrows between loop pills -->
  <g stroke="#9aa4b2" stroke-width="2" fill="#9aa4b2">
    <line x1="200" y1="394" x2="210" y2="394"/><polygon points="214,394 206,390 206,398"/>
    <line x1="310" y1="394" x2="320" y2="394"/><polygon points="324,394 316,390 316,398"/>
    <line x1="474" y1="394" x2="484" y2="394"/><polygon points="488,394 480,390 480,398"/>
    <line x1="608" y1="394" x2="618" y2="394"/><polygon points="622,394 614,390 614,398"/>
  </g>

  <!-- hard cases line -->
  <text x="80" y="452" font-size="12" fill="#555">Handles: iframes · shadow DOM · popups · cookie banners · file upload/download · multi-tab · 2FA · CAPTCHA hand-off · human cadence</text>
  <text x="80" y="474" font-size="12" fill="#555">Three autonomy tiers live here too: <tspan font-weight="600">run</tspan> (one-shot) · <tspan font-weight="600">serve</tspan> (HTTP goal server, no agent needed) · driven directly by your CLI.</text>

  <!-- arrow kestrel -> browser -->
  <line x1="490" y1="494" x2="490" y2="524" stroke="#9aa4b2" stroke-width="2"/>
  <polygon points="490,532 484,520 496,520" fill="#9aa4b2"/>

  <!-- BROWSER -> WEB -->
  <rect x="300" y="534" width="170" height="56" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="385" y="558" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">Real Chromium</text>
  <text x="385" y="576" text-anchor="middle" font-size="11.5" fill="#666">fresh, cloned, or your live profile</text>
  <line x1="470" y1="562" x2="508" y2="562" stroke="#9aa4b2" stroke-width="2"/>
  <polygon points="516,562 504,556 504,568" fill="#9aa4b2"/>
  <rect x="518" y="534" width="160" height="56" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="598" y="567" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e">The Web</text>

  <!-- footer: three ways to use it -->
  <text x="40" y="628" font-size="13" fill="#1a1a2e"><tspan font-weight="700">Same engine, three wrappers:</tspan>  <tspan fill="#b5532a" font-weight="600">Tool</tspan> = the CLI + daemon  ·  <tspan fill="#b5532a" font-weight="600">Skill</tspan> = the method that teaches the AI to drive it  ·  <tspan fill="#b5532a" font-weight="600">Agent</tspan> = a dispatchable worker that runs it alone.</text>
  <text x="40" y="648" font-size="12" fill="#555">Brain-agnostic: no Anthropic API key required — when Claude Code drives it, your Claude plan is the brain. Autonomous mode uses Groq.</text>
</svg>
