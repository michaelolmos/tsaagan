<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b5532a"/>
      <stop offset="1" stop-color="#7f3417"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="250" fill="url(#bg)"/>

  <!-- the stoop: a kestrel's controlled dive onto its target = the agent driving to its goal -->
  <path d="M 60 60 C 280 80, 360 150, 560 150 C 720 150, 800 120, 905 150"
        fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.55" stroke-dasharray="2 8" stroke-linecap="round"/>
  <!-- target / cursor at the end of the path -->
  <circle cx="905" cy="150" r="16" fill="none" stroke="#fff" stroke-width="2.5" stroke-opacity="0.85"/>
  <circle cx="905" cy="150" r="3.5" fill="#fff"/>
  <line x1="905" y1="126" x2="905" y2="134" stroke="#fff" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="905" y1="166" x2="905" y2="174" stroke="#fff" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="881" y1="150" x2="889" y2="150" stroke="#fff" stroke-width="2.5" stroke-opacity="0.85"/>
  <line x1="921" y1="150" x2="929" y2="150" stroke="#fff" stroke-width="2.5" stroke-opacity="0.85"/>

  <!-- minimal falcon glyph diving along the path -->
  <g transform="translate(150,84) rotate(20)">
    <path d="M 0 0 C 26 -16, 44 -14, 60 0 C 44 -4, 32 -2, 22 6 C 36 6, 48 9, 58 18 C 40 12, 16 12, 0 0 Z" fill="#fff" fill-opacity="0.92"/>
  </g>

  <!-- wordmark -->
  <text x="60" y="168" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-1">Kestrel</text>
  <text x="66" y="206" font-size="23" fill="#ffffff" fill-opacity="0.92">Human-like browser control for AI agents</text>
</svg>
